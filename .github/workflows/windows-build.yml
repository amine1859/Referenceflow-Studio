name: Build Windows installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run lint

      - name: Build installer
        run: npm run electron:dist

      - name: Upload unsigned installer for signing
        uses: actions/upload-artifact@v7
        with:
          name: RefFlowStudio-Windows-${{ github.sha }}
          path: |
            dist_desktop/RefFlowStudio-*-x64-Setup.exe
            dist_desktop/RefFlowStudio-*-x64-Setup.exe.blockmap
          if-no-files-found: error
          retention-days: 14
